services:
  spaces:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    expose:
      - "3000"
      - "3001"
    environment:
      - SERVICE_FQDN_SPACES_3000
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SPACES_DATA_PATH=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    volumes:
      - spaces-data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  spaces-data:
